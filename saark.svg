<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <defs>
    <linearGradient id="neonGlow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ff007f" />
      <stop offset="100%" stop-color="#00f0ff" />
    </linearGradient>
  </defs>
  
  <!-- Dunkler Hintergrund -->
  <rect width="64" height="64" fill="#0d0d0d" />
  
  <!-- Zweifarbiger Neon-Rahmen -->
  <rect x="3" y="3" width="58" height="58" fill="none" stroke="url(#neonGlow)" stroke-width="4" />
  
  <!-- Initialen TK in Pink & Cyan -->
  <text x="32" y="44" font-family="'Segoe UI', Arial, sans-serif" font-weight="900" font-size="28" text-anchor="middle" letter-spacing="-1">
    <tspan fill="#ff007f">T</tspan><tspan fill="#00f0ff">K</tspan>
  </text>
</svg>
